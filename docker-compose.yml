services:
  web:
    build:
      context: ./demo-code
    ports:
      - "8000:8000"
    volumes:
      - ./demo-code:/app
    environment:
      DJANGO_SETTINGS_MODULE: project.settings
      DD_AGENT_HOST: datadog-agent
      DD_TRACE_AGENT_PORT: "8126"
      DD_SERVICE: beginners-django
      DD_ENV: dev
      DD_VERSION: "1.0.0"
      DD_LOGS_INJECTION: "true"
      DD_TRACE_SAMPLE_RATE: "1"
      OTEL_SERVICE_NAME: beginners-django
      OTEL_EXPORTER_OTLP_ENDPOINT: http://datadog-agent:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
    depends_on:
      - datadog-agent

  datadog-agent:
    image: datadog/agent:latest
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_PROCESS_AGENT_ENABLED: "true"
      DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_HTTP_ENDPOINT: 0.0.0.0:4318
      DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_GRPC_ENDPOINT: 0.0.0.0:4317
      # Works around a known agent bug where the OTLP pipeline fails to start
      # once /host/proc is mounted: https://github.com/DataDog/datadog-agent/issues/32947
      HOST_PROC: /proc
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
